<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <div style="width: 100%; display: flex; justify-items: center; justify-content: center; flex-direction: column;">
        <h1>Login</h1>
        <form action="/login" method='POST'>
            <input id='username' placeholder='Enter your nickname' />
            <input id='password' placeholder='Enter your account password' />
            <button type='submit'>Логин</button>
        </form>
    </div>
</body>

</html>
